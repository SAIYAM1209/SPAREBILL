<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoBill – Role Based System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f6fbff}
.hidden{display:none}
header{padding:15px 30px;background:white;box-shadow:0 0 20px rgba(0,255,255,.3)}
header h2{color:#00bcd4;margin:0}
nav button{margin-left:10px;padding:8px 18px;border:none;border-radius:20px;
background:linear-gradient(135deg,#00e5ff,#00ffa6);cursor:pointer}

.main{padding:30px}
.card{background:white;padding:25px;border-radius:18px;
box-shadow:0 0 20px rgba(0,255,255,.25);max-width:1000px;margin:auto}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.product{padding:15px;border-radius:14px;background:#f0fbff;text-align:center;
cursor:pointer;box-shadow:0 0 12px rgba(0,255,255,.25)}

table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #cce;padding:8px;text-align:center}

.btn{padding:8px 16px;border:none;border-radius:20px;
background:linear-gradient(135deg,#00e5ff,#00ffa6);cursor:pointer}
.del{background:#ff5252;color:white}
.center{text-align:center}
select,input{width:100%;padding:10px;margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN / REGISTER -->
<div class="main" id="auth">
  <div class="card" style="max-width:400px">
    <h2 class="center">AutoBill Login</h2>

    <select id="role">
      <option>Admin</option>
      <option>Cashier</option>
      <option>Customer</option>
    </select>

    <input placeholder="Email">
    <input type="password" placeholder="Password">

    <button class="btn" style="width:100%;margin-top:15px" onclick="login()">Login</button>
    <p class="center">or Register</p>
    <button class="btn" style="width:100%" onclick="register()">Register</button>
  </div>
</div>

<!-- HEADER -->
<header id="header" class="hidden">
  <h2>AutoBill</h2>
  <nav>
    <button onclick="show('products')">Products</button>
    <button onclick="show('billing')">Billing</button>
    <button onclick="show('invoice')">Invoice</button>
    <button onclick="logout()">Logout</button>
  </nav>
</header>

<!-- APP -->
<div class="main hidden" id="app">

<!-- PRODUCTS -->
<div id="products" class="card">
  <h3>Available Products</h3>
  <div class="products" id="productList"></div>
</div>

<!-- BILLING -->
<div id="billing" class="card hidden">
  <h3>Create Bill</h3>

  <table>
    <thead>
      <tr><th>Product</th><th>Qty</th><th>Price</th><th>Total</th><th></th></tr>
    </thead>
    <tbody id="billBody"></tbody>
  </table>

  <h3 id="subtotal">Subtotal: ₹0</h3>
  <h3 id="gst">GST (18%): ₹0</h3>
  <h2 id="grand">Grand Total: ₹0</h2>

  <button class="btn" onclick="generateInvoice()">Generate Invoice</button>
</div>

<!-- INVOICE -->
<div id="invoice" class="card hidden">
  <h3>Invoice Preview</h3>
  <div id="invoiceContent"></div>
  <button class="btn" onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<script>
let roleType="";
let cart=[];

const products=[
  {name:"Brake Pad",price:1500},
  {name:"Engine Oil",price:800},
  {name:"Clutch Plate",price:3500},
  {name:"Air Filter",price:450}
];

function login(){
  roleType=role.value;
  auth.classList.add("hidden");
  header.classList.remove("hidden");
  app.classList.remove("hidden");
  loadProducts();
}

function register(){
  alert("Registered successfully ("+role.value+")");
}

function logout(){location.reload()}

function show(id){
  ["products","billing","invoice"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function loadProducts(){
  productList.innerHTML="";
  products.forEach(p=>{
    productList.innerHTML+=`
      <div class="product" onclick="addToCart('${p.name}',${p.price})">
        <b>${p.name}</b><br>₹${p.price}
      </div>`;
  });
}

function addToCart(name,price){
  cart.push({name,price,qty:1});
  renderBill();
  show('billing');
}

function renderBill(){
  billBody.innerHTML="";
  let sum=0;
  cart.forEach((c,i)=>{
    let t=c.price*c.qty; sum+=t;
    billBody.innerHTML+=`
      <tr>
        <td>${c.name}</td>
        <td>${c.qty}</td>
        <td>${c.price}</td>
        <td>${t}</td>
        <td><button class="del" onclick="removeItem(${i})">X</button></td>
      </tr>`;
  });
  let gst=sum*0.18;
  subtotal.innerText="Subtotal: ₹"+sum;
  gstElem=gst.toFixed(2);
  gstElem;
  gst.innerText="GST (18%): ₹"+gst.toFixed(2);
  grand.innerText="Grand Total: ₹"+(sum+gst).toFixed(2);
}

function removeItem(i){
  cart.splice(i,1);
  renderBill();
}

function generateInvoice(){
  let html="<ul>";
  cart.forEach(c=>html+=`<li>${c.name} - ₹${c.price}</li>`);
  html+="</ul><h3>"+grand.innerText+"</h3>";
  invoiceContent.innerHTML=html;
  show('invoice');
}

function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  // Header
  doc.setFontSize(18);
  doc.text("AutoBill Invoice", 70, y);

  y += 10;
  doc.setFontSize(12);
  doc.text("Date: " + new Date().toLocaleDateString(), 20, y);

  y += 10;
  doc.text("------------------------------------------------------", 20, y);

  // Table Headings
  y += 10;
  doc.text("Product", 20, y);
  doc.text("Qty", 100, y);
  doc.text("Price", 120, y);
  doc.text("Total", 160, y);

  y += 5;
  doc.text("------------------------------------------------------", 20, y);

  // Products
  let subtotal = 0;
  cart.forEach(item => {
    let total = item.qty * item.price;
    subtotal += total;

    y += 10;
    doc.text(item.name, 20, y);
    doc.text(String(item.qty), 100, y);
    doc.text("₹" + item.price, 120, y);
    doc.text("₹" + total, 160, y);
  });

  // Totals
  let gst = subtotal * 0.18;
  let grand = subtotal + gst;

  y += 15;
  doc.text("------------------------------------------------------", 20, y);

  y += 10;
  doc.text("Subtotal:", 120, y);
  doc.text("₹" + subtotal.toFixed(2), 160, y);

  y += 8;
  doc.text("GST (18%):", 120, y);
  doc.text("₹" + gst.toFixed(2), 160, y);

  y += 8;
  doc.setFontSize(14);
  doc.text("Grand Total:", 120, y);
  doc.text("₹" + grand.toFixed(2), 160, y);

  // Footer
  y += 20;
  doc.setFontSize(10);
  doc.text("Thank you for your purchase!", 70, y);

  doc.save("AutoBill_Invoice.pdf");
}


</script>

</body>
</html>
